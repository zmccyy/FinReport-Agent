# FinReport Agent — Docker Compose 生产编排
# 8 个 service：frontend / backend / ai-service / mysql / redis / rabbitmq / minio / milvus
# 版本：v1.0 | 日期：2026-07-14

name: finreport

services:
  # ================================================================================
  # 基础设施服务
  # ================================================================================

  mysql:
    image: mysql:8.0
    container_name: finreport-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-finreport}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-finreport}
      MYSQL_USER: ${MYSQL_USER:-finreport}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-finreport}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    networks:
      - finreport-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-finreport}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7.2-alpine
    container_name: finreport-redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      ${REDIS_PASSWORD:+--requirepass ${REDIS_PASSWORD}}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - finreport-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: finreport-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-guest}
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"       # AMQP
      - "${RABBITMQ_MGMT_PORT:-15672}:15672" # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro
    networks:
      - finreport-net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  minio:
    image: minio/minio:latest
    container_name: finreport-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"       # S3 API
      - "${MINIO_CONSOLE_PORT:-9001}:9001"   # Web Console
    volumes:
      - minio_data:/data
    networks:
      - finreport-net
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # Creates required buckets exactly once after MinIO is ready. This service is not long-lived.
  minio-init:
    image: minio/mc:latest
    container_name: finreport-minio-init
    restart: "no"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_ENDPOINT: http://minio:9000
    volumes:
      - ./minio/init.sh:/init.sh:ro
    entrypoint: ["/bin/sh", "/init.sh"]
    networks:
      - finreport-net
    depends_on:
      minio:
        condition: service_healthy

  # Milvus 元数据存储
  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: finreport-etcd
    restart: unless-stopped
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    command: >
      etcd
      --name=default
      --advertise-client-urls=http://etcd:2379
      --listen-client-urls=http://0.0.0.0:2379
      --initial-advertise-peer-urls=http://etcd:2380
      --listen-peer-urls=http://0.0.0.0:2380
      --initial-cluster=default=http://etcd:2380
      --data-dir=/etcd
    volumes:
      - etcd_data:/etcd
    networks:
      - finreport-net
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  milvus:
    image: milvusdb/milvus:v2.4.0
    container_name: finreport-milvus
    restart: unless-stopped
    command: milvus run standalone
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MINIO_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET_NAME: a-bucket
      MINIO_USE_SSL: "false"
    ports:
      - "${MILVUS_PORT:-19530}:19530"        # gRPC
      - "${MILVUS_METRIC_PORT:-9091}:9091"   # Metrics / health
    volumes:
      - milvus_data:/var/lib/milvus
    networks:
      - finreport-net
    depends_on:
      etcd:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9091/healthz"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 40s

  # ================================================================================
  # 应用服务
  # ================================================================================

  ai-service:
    build:
      context: ../ai-service
      dockerfile: Dockerfile
    image: finreport/ai-service:latest
    container_name: finreport-ai-service
    restart: unless-stopped
    environment:
      PYTHONUNBUFFERED: "1"
      AI_SERVICE_PORT: "8000"
      # 基础设施连接
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_USER: ${MYSQL_USER:-finreport}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-finreport}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-finreport}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_PASS: ${RABBITMQ_PASS:-guest}
      MILVUS_HOST: milvus
      MILVUS_PORT: "19530"
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      # 模型路径
      MODELS_DIR: /models
    ports:
      - "${AI_SERVICE_PORT:-8000}:8000"
    volumes:
      - models:/models:ro
    networks:
      - finreport-net
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/internal/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 60s

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    image: finreport/backend:latest
    container_name: finreport-backend
    restart: unless-stopped
    environment:
      JAVA_OPTS: "-Xms256m -Xmx512m"
      SPRING_PROFILES_ACTIVE: docker
      # 基础设施连接
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_USER: ${MYSQL_USER:-finreport}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-finreport}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-finreport}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_PASS: ${RABBITMQ_PASS:-guest}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      AI_SERVICE_URL: http://ai-service:8000
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    networks:
      - finreport-net
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      ai-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/internal/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 60s

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8080
        VITE_SSE_BASE_URL: http://localhost:8080
    image: finreport/frontend:latest
    container_name: finreport-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    networks:
      - finreport-net
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:80/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

# ================================================================================
# 持久化卷
# ================================================================================

volumes:
  mysql_data:
    name: finreport-mysql-data
  redis_data:
    name: finreport-redis-data
  rabbitmq_data:
    name: finreport-rabbitmq-data
  minio_data:
    name: finreport-minio-data
  etcd_data:
    name: finreport-etcd-data
  milvus_data:
    name: finreport-milvus-data
  models:
    name: finreport-models
    # 模型权重卷 — 使用 docker compose 管理
    # 将模型文件复制到卷中：docker cp ./models/. finreport-models:/models/

# ================================================================================
# 网络
# ================================================================================

networks:
  finreport-net:
    name: finreport-net
    driver: bridge
