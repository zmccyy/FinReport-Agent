# FinReport Agent — L2 Backend 配置
# 版本：v1.0 | 日期：2026-07-14

server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: finreport-backend

  # --- 默认 profile（本地开发） ---
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  # --- R2DBC ---
  r2dbc:
    url: r2dbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:finreport}
    username: ${MYSQL_USER:finreport}
    password: ${MYSQL_PASSWORD:finreport}
    pool:
      initial-size: 4
      max-size: 20
      max-idle-time: 30m

  # --- JDBC (Flyway) ---
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:finreport}?useSSL=false&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER:finreport}
    password: ${MYSQL_PASSWORD:finreport}
    driver-class-name: com.mysql.cj.jdbc.Driver

  # --- Flyway ---
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: "0"

  # --- Redis ---
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  # --- RabbitMQ ---
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASS:guest}
    listener:
      simple:
        prefetch: 1
        acknowledge-mode: manual

  # --- Security (M1.08 前默认关闭) ---
  autoconfigure:
    exclude: []

# --- MinIO ---
minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}

# --- AI Service ---
ai-service:
  base-url: ${AI_SERVICE_URL:http://localhost:8000}

# --- Actuator ---
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

# --- Logging ---
logging:
  level:
    root: INFO
    com.finreport: DEBUG
    org.springframework.r2dbc: INFO
---
# ================================================================================
# Docker 环境
# ================================================================================
spring:
  config:
    activate:
      on-profile: docker
---
# ================================================================================
# 本地开发（无 Docker）
# ================================================================================
spring:
  config:
    activate:
      on-profile: local
  flyway:
    enabled: ${FLYWAY_ENABLED:true}
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisReactiveAutoConfiguration
      - org.springframework.boot.autoconfigure.data.r2dbc.R2dbcAutoConfiguration
