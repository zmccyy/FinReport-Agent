# FinReport Agent — L2 Backend 集成测试 profile（M2.12）
# 仅在 -Pintegration 激活 *IT.java 时加载。
# Testcontainers 容器属性通过 @DynamicPropertySource 注入，避免硬编码端口。

spring:
  flyway:
    enabled: true
    locations: classpath:db/migration
    clean-disabled: false

  # 关闭 RabbitMQ 自动连接（M2.12 IT 用 @MockBean TaskMessageProducer 替换真实 MQ）
  rabbitmq:
    listener:
      simple:
        auto-startup: false

  # 关闭不必要的 autoconfigure 加快上下文启动
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.reactive.ReactiveSecurityAutoConfiguration
      - org.springframework.boot.actuate.autoconfigure.security.reactive.ReactiveManagementWebSecurityAutoConfiguration

# 关闭 JWT 校验在 IT 中（用固定 X-User-Id header 模拟）
jwt:
  secret: it-test-secret-not-for-production-use-only
  access-expiration: 3600
  refresh-expiration: 604800
  issuer: finreport-it

# MinIO 在 IT 中不使用（FileService 被 @MockBean 替换）
minio:
  endpoint: http://localhost:9000
  access-key: it-test
  secret-key: it-test

ai-service:
  base-url: http://localhost:8000

logging:
  level:
    root: WARN
    com.finreport: DEBUG
    org.springframework.r2dbc: INFO
    org.flywaydb: INFO
