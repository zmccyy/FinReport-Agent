# JaCoCo offline runtime configuration.
# The instrumented .class files embed the jacoco runtime, which reads this
# file from the classpath at startup to decide where to write exec data.
# We cannot rely on surefire argLine because forkCount=0 (required to avoid
# the boot-manifest-JAR GBK decoding crash on the non-ASCII workspace path).
destfile=target/jacoco.exec
output=file
dumponexit=false
