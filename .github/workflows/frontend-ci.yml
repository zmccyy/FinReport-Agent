name: Frontend CI

on:
  pull_request:
  push:
    branches: [main, develop, "feature/**", "fix/**"]

permissions:
  contents: read

concurrency:
  group: frontend-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Vue quality, build, and Playwright smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run lint
        working-directory: frontend
        run: npm run lint

      - name: Build production bundle
        working-directory: frontend
        run: npm run build

      - name: Set up Python for Playwright smoke test
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install E2E dependencies and Chromium
        run: |
          python -m pip install --upgrade pip
          python -m pip install "pika>=1.3,<2.0" "playwright==1.55.0"
          python -m playwright install --with-deps chromium

      - name: Start development stack
        # --wait-timeout 600 gives the ai-service container enough time to
        # build its dev image (pip install) and pass the healthcheck. The
        # previous 300s timeout was too tight on cold CI runners where Docker
        # layer caching is unavailable.
        run: >-
          docker compose -p finreport-ci
          -f deploy/docker-compose.yml
          -f deploy/docker-compose.dev.yml
          up -d --build --wait --wait-timeout 600

      - name: Run Playwright smoke test
        run: python scripts/e2e_m116.py

      - name: Upload browser diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-diagnostics
          path: "**/m116/*.png"
          if-no-files-found: warn

      - name: Print Compose logs on failure
        if: failure()
        run: >-
          docker compose -p finreport-ci
          -f deploy/docker-compose.yml
          -f deploy/docker-compose.dev.yml
          logs --no-color

      - name: Stop development stack
        if: always()
        run: >-
          docker compose -p finreport-ci
          -f deploy/docker-compose.yml
          -f deploy/docker-compose.dev.yml
          down --volumes --remove-orphans
