name: AI Service CI

on:
  pull_request:
  push:
    branches: [main, develop, "feature/**", "fix/**"]

permissions:
  contents: read

concurrency:
  group: ai-service-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Python 3.11 quality and mock service checks
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: ai-service
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: ai-service/pyproject.toml

      - name: Install development dependencies
        # Install only the dev extras + the lightweight clients needed by the
        # init-script tests (minio, pymilvus). The heavy prod dependencies
        # (paddlepaddle, torch, transformers, weasyprint, ...) are intentionally
        # skipped: app modules import them lazily inside functions, so ruff,
        # black and pytest (with mocks) can run without them. This cuts install
        # time from ~10 min to ~1 min and avoids intermittent wheel-build
        # failures on the ubuntu runner.
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]" minio pymilvus

      - name: Check lint and formatting
        run: |
          ruff check app/ tests/
          black --check app/ tests/

      - name: Run unit tests with coverage report
        env:
          PYTHONPATH: ${{ github.workspace }}/ai-service
        run: python -m pytest tests/ -v --cov=app --cov-fail-under=80

      - name: Run M1 mock service dry run
        env:
          AI_SERVICE_MQ_CONSUMER_ENABLED: "false"
        run: |
          python - <<'PY'
          from fastapi.testclient import TestClient

          from app.main import app

          with TestClient(app) as client:
              response = client.get("/internal/health")
              assert response.status_code == 200
              assert response.json()["status"] == "UP"
          PY
