name: Backend CI

on:
  pull_request:
  push:
    branches: [main, develop, "feature/**", "fix/**"]

permissions:
  contents: read

concurrency:
  group: backend-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Java 21 quality and integration checks
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Temurin Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Enable Maven wrapper
        run: chmod +x mvnw

      - name: Run unit tests
        run: ./mvnw test

      - name: Enforce coverage gate
        run: ./mvnw verify

      - name: Run static analysis
        run: ./mvnw checkstyle:check spotbugs:check

      - name: Run Testcontainers integration tests
        run: ./mvnw verify -Pintegration
